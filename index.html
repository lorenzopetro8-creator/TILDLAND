<!doctype html>
<html lang="it"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Tildland</title><meta name="apple-mobile-web-app-title" content="Tildland"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#080b20">
<link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="assets/icon.png">
<style>
:root{--bg:#080b20;--panel:rgba(13,18,45,.80);--txt:#fff;--mut:#b8c7ff;--line:rgba(255,255,255,.18)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;min-height:100svh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:var(--txt);background:#080b20 url('assets/bg.jpg') center/cover fixed no-repeat;overflow-x:hidden} body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 20%,rgba(30,80,180,.28),transparent 40%),linear-gradient(180deg,rgba(3,6,20,.55),rgba(3,6,20,.92));z-index:-1}
.app{max-width:980px;margin:0 auto;padding:18px 14px 34px} .top{text-align:center;padding:12px 0 8px} h1{font-size:44px;margin:0;letter-spacing:1px;text-shadow:0 4px 18px #000} .sub{color:#d5ddff;margin-top:5px;font-weight:700} .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:18px} .deckBtn{border:1px solid var(--line);border-radius:22px;padding:18px 12px;min-height:112px;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.06));box-shadow:0 14px 36px rgba(0,0,0,.35);backdrop-filter:blur(8px);color:#fff;font-weight:900;font-size:18px;text-align:left} .deckBtn .emoji{font-size:32px;display:block} .deckBtn .count{font-size:13px;color:#dbe4ff;margin-top:9px} button{cursor:pointer;border:0;border-radius:18px;padding:14px 18px;background:#fff;color:#10142d;font-weight:900;font-size:16px;box-shadow:0 10px 24px rgba(0,0,0,.25)} .ghost{background:rgba(255,255,255,.13);color:#fff;border:1px solid var(--line)} .orange{background:linear-gradient(135deg,#ff9f0a,#ff5e00);color:#fff} .screen{display:none} .active{display:block} .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0 16px} .panel{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 20px 45px rgba(0,0,0,.4);backdrop-filter:blur(10px)} .deckBox{height:260px;border-radius:28px;border:2px solid rgba(255,255,255,.24);display:grid;place-items:center;margin:14px auto;max-width:220px;background:linear-gradient(145deg,rgba(255,149,0,.95),rgba(90,32,0,.92));box-shadow:0 22px 45px rgba(0,0,0,.45),inset 0 0 0 10px rgba(255,255,255,.08)} .deckBox.shuffling{animation:shake .55s ease-in-out 2} @keyframes shake{0%,100%{transform:translateX(0) rotate(0)}25%{transform:translateX(-12px) rotate(-4deg)}50%{transform:translateX(10px) rotate(5deg)}75%{transform:translateX(-6px) rotate(-2deg)}} .cardView{display:none;text-align:center} .cardView img{max-width:100%;max-height:72svh;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.65);background:#111} .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px} .empty{color:#fff;text-align:center;padding:22px} .manageRow{display:grid;grid-template-columns:1fr;gap:12px} select,input{width:100%;font-size:16px;border-radius:14px;border:1px solid var(--line);padding:14px;background:rgba(0,0,0,.28);color:#fff} input[type=file]{background:rgba(255,255,255,.1)} .small{font-size:13px;color:#cbd4ff;line-height:1.35} .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px} .thumbs img{width:58px;height:82px;object-fit:cover;border-radius:8px} @media (min-width:760px){.grid{grid-template-columns:repeat(4,1fr)} h1{font-size:58px} .deckBox{height:320px;max-width:260px}}
</style></head><body><div class="app">
<section id="home" class="screen active"><div class="top"><h1>Tildland</h1><div class="sub">Scegli un mondo e pesca una carta</div></div><div id="deckGrid" class="grid"></div><div class="actions"><button class="ghost" onclick="showManage()">⚙️ Gestisci mazzi</button></div></section>
<section id="play" class="screen"><div class="bar"><button class="ghost" onclick="goHome()">← Mondi</button><strong id="playTitle"></strong><button class="ghost" onclick="shuffleDeck()">🔀 Mischia</button></div><div class="panel"><div id="deckBox" class="deckBox"><div style="text-align:center"><div style="font-size:46px">🃏</div><div id="deckName" style="font-size:22px;font-weight:900"></div><div id="remain" class="small"></div></div></div><div id="emptyMsg" class="empty" style="display:none"></div><div class="actions"><button class="orange" onclick="drawCard()">Pesca carta</button></div><div id="cardView" class="cardView"><img id="cardImg" alt="Carta pescata"><div class="actions"><button class="orange" onclick="drawCard()">Pesca ancora</button><button class="ghost" onclick="goHome()">Torna ai mondi</button></div></div></div></section>
<section id="manage" class="screen"><div class="bar"><button class="ghost" onclick="goHome()">← Mondi</button><strong>Gestisci mazzi</strong><span></span></div><div class="panel manageRow"><p class="small">Aggiungi carte da iPhone/iPad. Restano salvate su questo dispositivo. Per passarle agli amici usa Esporta/Importa backup.</p><select id="mDeck"></select><input id="fileInput" type="file" accept="image/*" multiple><button class="orange" onclick="addFiles()">Aggiungi carte selezionate</button><div class="actions"><button onclick="exportBackup()">Esporta backup</button><button class="ghost" onclick="document.getElementById('importFile').click()">Importa backup</button><input id="importFile" type="file" accept="application/json" style="display:none" onchange="importBackup(event)"></div><div id="manageInfo" class="small"></div><div id="thumbs" class="thumbs"></div></div></section>
</div><script>
const BUILT_IN = {"rosso": {"name": "Processo", "emoji": "🔴", "color": "#ff3b30", "cards": []}, "giallo": {"name": "JackpoTami", "emoji": "🟡", "color": "#ffd60a", "cards": []}, "arancione": {"name": "Tildiana Jones", "emoji": "🟠", "color": "#ff9500", "cards": ["cards/arancione/card_01.jpg", "cards/arancione/card_02.jpg", "cards/arancione/card_03.jpg", "cards/arancione/card_04.jpg", "cards/arancione/card_05.jpg", "cards/arancione/card_06.jpg", "cards/arancione/card_07.jpg", "cards/arancione/card_08.jpg", "cards/arancione/card_09.jpg", "cards/arancione/card_10.jpg", "cards/arancione/card_11.jpg"]}, "viola": {"name": "Bonus/Malus", "emoji": "🟣", "color": "#bf5af2", "cards": []}, "blu": {"name": "Matozart", "emoji": "🔵", "color": "#0a84ff", "cards": []}, "verde": {"name": "Jumati", "emoji": "🟢", "color": "#30d158", "cards": []}, "personaggi": {"name": "Estrai Pedina", "emoji": "⚪", "color": "#e5e5ea", "cards": []}};
let decks = JSON.parse(JSON.stringify(BUILT_IN));
let current=null, pile=[];
const $=id=>document.getElementById(id);
function loadLocal(){try{const s=localStorage.getItem('tildland_extra_cards_v1'); if(s){const extra=JSON.parse(s); for(const k in extra) if(decks[k]) decks[k].cards.push(...extra[k]);}}catch(e){console.log(e)}}
function saveExtra(extra){localStorage.setItem('tildland_extra_cards_v1',JSON.stringify(extra))}
function getExtra(){try{return JSON.parse(localStorage.getItem('tildland_extra_cards_v1')||'{}')}catch(e){return {}}}
function renderHome(){const g=$('deckGrid'); g.innerHTML=''; Object.keys(decks).forEach(k=>{const d=decks[k]; const b=document.createElement('button'); b.className='deckBtn'; b.style.borderColor=d.color; b.innerHTML=`<span class="emoji">${d.emoji}</span><div>${d.name}</div><div class="count">${d.cards.length} carte</div>`; b.onclick=()=>openDeck(k); g.appendChild(b);})}
function renderManage(){const sel=$('mDeck'); sel.innerHTML=''; Object.keys(decks).forEach(k=>{let o=document.createElement('option');o.value=k;o.textContent=decks[k].emoji+' '+decks[k].name;sel.appendChild(o)}); sel.onchange=renderThumbs; renderThumbs();}
function screen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
function goHome(){renderHome();screen('home')} function showManage(){renderManage();screen('manage')}
function openDeck(k){current=k; pile=[...decks[k].cards]; shuffle(pile); $('playTitle').textContent=decks[k].emoji+' '+decks[k].name; $('deckName').textContent=decks[k].name; $('deckBox').style.background=`linear-gradient(145deg,${decks[k].color},#181029)`; $('cardView').style.display='none'; updateRemain(); screen('play')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function shuffleDeck(){if(!current)return; pile=[...decks[current].cards]; shuffle(pile); $('deckBox').classList.remove('shuffling'); void $('deckBox').offsetWidth; $('deckBox').classList.add('shuffling'); $('cardView').style.display='none'; updateRemain();}
function updateRemain(){$('remain').textContent=pile.length+' carte rimaste'; $('emptyMsg').style.display=decks[current]?.cards.length?'none':'block'; $('emptyMsg').textContent='Questo mazzo è vuoto. Aggiungi carte da Gestisci mazzi.'}
function drawCard(){if(!current)return; if(pile.length===0){if(decks[current].cards.length===0) return; if(confirm('Mazzo finito. Vuoi rimescolare?')) shuffleDeck(); else return;} const src=pile.pop(); $('cardImg').src=src; $('cardView').style.display='block'; updateRemain();}
function addFiles(){const files=[...$('fileInput').files]; const k=$('mDeck').value; if(!files.length)return alert('Seleziona almeno una immagine'); const extra=getExtra(); extra[k]=extra[k]||[]; let done=0; files.forEach(f=>{const r=new FileReader(); r.onload=()=>{extra[k].push(r.result); done++; if(done===files.length){saveExtra(extra); decks=JSON.parse(JSON.stringify(BUILT_IN)); loadLocal(); $('fileInput').value=''; renderManage(); alert('Carte aggiunte.');}}; r.readAsDataURL(f);})}
function renderThumbs(){const k=$('mDeck').value||'arancione'; $('manageInfo').textContent=`${decks[k].name}: ${decks[k].cards.length} carte totali`; $('thumbs').innerHTML=decks[k].cards.slice(0,40).map(s=>`<img src="${s}">`).join('')}
function exportBackup(){const blob=new Blob([JSON.stringify(getExtra())],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='tildland-backup.json'; a.click();}
function importBackup(e){const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{saveExtra(JSON.parse(r.result)); decks=JSON.parse(JSON.stringify(BUILT_IN)); loadLocal(); renderManage(); alert('Backup importato')}catch(err){alert('File non valido')}}; r.readAsText(f)}
loadLocal(); renderHome();
if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script></body></html>
